<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만화 퀴즈</title>
<script>
var QUIZ_JSON = "https://raw.githubusercontent.com/lidotdev/KakaoChatbot/main/quiz.json";

function getParam(name) {
  var url = new URLSearchParams(window.location.search);
  return url.get(name);
}

function setMeta(name, content) {
  var el = document.querySelector('meta[property="' + name + '"]') ||
           document.querySelector('meta[name="' + name + '"]');
  if (!el) {
    el = document.createElement('meta');
    if (name.startsWith('og:') || name.startsWith('twitter:')) {
      el.setAttribute('property', name);
    } else {
      el.setAttribute('name', name);
    }
    document.head.appendChild(el);
  }
  el.setAttribute('content', content);
}

window.onload = function() {
  var id = parseInt(getParam('id'));
  var cat = getParam('cat') || 'anime';

  if (!id) {
    document.getElementById('msg').textContent = '잘못된 접근입니다.';
    return;
  }

  fetch(QUIZ_JSON)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var list = data[cat] || [];
      var item = null;
      for (var i = 0; i < list.length; i++) {
        if (list[i].id === id) { item = list[i]; break; }
      }
      if (!item) {
        document.getElementById('msg').textContent = '퀴즈를 찾을 수 없습니다.';
        return;
      }

      setMeta('og:title', '만화 퀴즈!');
      setMeta('og:description', '힌트: ' + item.hint + ' | !만화정답 [제목]');
      setMeta('og:image', item.img);
      setMeta('og:image:width', '600');
      setMeta('og:image:height', '400');
      setMeta('og:type', 'website');
      setMeta('twitter:card', 'summary_large_image');
      setMeta('twitter:image', item.img);

      document.getElementById('img').src = item.img;
      document.getElementById('hint').textContent = '힌트: ' + item.hint;
      document.getElementById('msg').textContent = '이 만화의 제목은 무엇일까요?';
      document.title = '만화 퀴즈 - ' + item.hint;
    })
    .catch(function() {
      document.getElementById('msg').textContent = '데이터 로딩 실패';
    });
};
</script>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
  img { width: 100%; border-radius: 12px; }
  h2 { color: #333; }
  .hint { background: #fff3cd; padding: 10px 16px; border-radius: 8px; font-size: 15px; margin-top: 12px; }
  .answer-box { background: white; padding: 16px; border-radius: 12px; margin-top: 16px; }
</style>
</head>
<body>
<h2 id="msg">퀴즈 불러오는 중...</h2>
<img id="img" src="" alt="퀴즈 이미지" style="display:block;">
<div class="hint" id="hint"></div>
<div class="answer-box">
  카카오톡 채팅방에서<br>
  <strong>!만화정답 [제목]</strong> 으로 답하세요!
</div>
</body>
</html>
